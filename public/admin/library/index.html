<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TST Image Library</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #111;
    --surface: #1a1a1a;
    --surface2: #222;
    --surface3: #2a2a2a;
    --border: #333;
    --accent: #4a9eff;
    --accent-dim: rgba(74,158,255,0.15);
    --text: #e0e0e0;
    --text-dim: #888;
    --text-muted: #555;
    --radius: 8px;
    --radius-sm: 5px;
    --topbar-h: 110px;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    font-size: 13px;
    min-height: 100vh;
  }

  /* ── TOP BAR ─────────────────────────────────── */
  #topbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px 8px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  #topbar-row1 {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  #site-title {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--text);
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #site-title svg {
    flex-shrink: 0;
    opacity: 0.9;
  }

  #search-wrap {
    position: relative;
    flex: 1;
    max-width: 320px;
  }

  #search-wrap svg {
    position: absolute;
    left: 9px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
  }

  #search {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    padding: 6px 10px 6px 30px;
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }

  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--text-muted); }

  #search-clear {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 2px;
    display: none;
    line-height: 1;
    font-size: 15px;
  }

  #search-clear:hover { color: var(--text); }

  #counter {
    margin-left: auto;
    font-size: 12px;
    color: var(--text-dim);
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* ── FILTER BAR ──────────────────────────────── */
  #filters {
    display: flex;
    align-items: center;
    gap: 5px;
    flex-wrap: wrap;
    overflow: hidden;
  }

  .filter-hint {
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
    margin-left: auto;
    padding-right: 2px;
  }

  .cat-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text-dim);
    padding: 4px 11px;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.12s, color 0.12s, border-color 0.12s;
    user-select: none;
  }

  .cat-btn:hover {
    background: var(--surface3);
    color: var(--text);
    border-color: #444;
  }

  .cat-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
  }

  .cat-btn .count {
    opacity: 0.65;
    font-size: 11px;
    margin-left: 2px;
  }

  /* ── GRID ────────────────────────────────────── */
  #grid-wrap {
    padding: 14px 12px;
  }

  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(178px, 1fr));
    gap: 10px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.12s, border-color 0.12s, box-shadow 0.12s;
    position: relative;
  }

  .card:hover {
    transform: translateY(-2px);
    border-color: var(--accent);
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    z-index: 1;
  }

  .card-thumb {
    width: 100%;
    aspect-ratio: 4/3;
    object-fit: cover;
    display: block;
    background: var(--surface2);
  }

  .card-info {
    padding: 7px 8px 8px;
  }

  .card-name {
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.4;
  }

  .card-desc {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: none;
  }

  .card:hover .card-desc {
    display: block;
  }

  .card-cat-badge {
    position: absolute;
    top: 6px;
    right: 6px;
    background: rgba(0,0,0,0.65);
    color: #ccc;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 10px;
    backdrop-filter: blur(4px);
    display: none;
  }

  /* Show category badge when "All" is active */
  body.show-cat-badge .card-cat-badge { display: block; }

  /* ── EMPTY STATE ─────────────────────────────── */
  #empty {
    display: none;
    text-align: center;
    padding: 80px 20px;
    color: var(--text-muted);
  }

  #empty svg { margin-bottom: 16px; opacity: 0.3; }
  #empty p { font-size: 14px; }

  /* ── LIGHTBOX ────────────────────────────────── */
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: rgba(0,0,0,0.88);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }

  #lightbox.open { display: flex; }

  #lb-inner {
    display: flex;
    flex-direction: column;
    max-width: min(1200px, 96vw);
    max-height: 96vh;
    margin: auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    width: 100%;
  }

  #lb-image-wrap {
    position: relative;
    flex: 1;
    min-height: 0;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #lb-img {
    max-width: 100%;
    max-height: 70vh;
    object-fit: contain;
    display: block;
  }

  #lb-close {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.1);
    color: #fff;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    transition: background 0.1s;
    z-index: 10;
  }

  #lb-close:hover { background: rgba(255,255,255,0.2); }

  .lb-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.55);
    border: 1px solid rgba(255,255,255,0.1);
    color: #fff;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.1s;
    z-index: 10;
    user-select: none;
  }

  .lb-nav:hover { background: rgba(255,255,255,0.18); }
  #lb-prev { left: 10px; }
  #lb-next { right: 10px; }

  #lb-panel {
    padding: 14px 18px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 20px;
    align-items: flex-start;
    flex-shrink: 0;
  }

  #lb-meta { flex: 1; min-width: 0; }

  #lb-filename {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    word-break: break-all;
    margin-bottom: 4px;
  }

  #lb-desc {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 8px;
    line-height: 1.5;
  }

  #lb-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }

  .lb-tag {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
  }

  #lb-specs {
    display: flex;
    flex-direction: column;
    gap: 5px;
    font-size: 11px;
    color: var(--text-muted);
    flex-shrink: 0;
    text-align: right;
    min-width: 120px;
  }

  .lb-spec-val {
    color: var(--text-dim);
    font-weight: 500;
  }

  #lb-counter {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 6px;
  }

  #lb-download {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    margin-top: 10px;
    padding: 6px 12px;
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    border-radius: var(--radius-sm);
    color: var(--accent);
    font-size: 12px;
    font-weight: 500;
    text-decoration: none;
    transition: background 0.12s;
  }

  #lb-download:hover { background: rgba(74,158,255,0.25); }

  /* ── MOBILE ──────────────────────────────────── */
  @media (max-width: 640px) {
    :root { --topbar-h: 130px; }

    #topbar-row1 { flex-wrap: wrap; }
    #search-wrap { max-width: 100%; flex: 1 1 200px; }
    #counter { margin-left: 0; }

    #grid {
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 8px;
    }

    #lb-panel { flex-direction: column; gap: 12px; }
    #lb-specs { text-align: left; }
    .filter-hint { display: none; }
  }

  @media (max-width: 400px) {
    #grid { grid-template-columns: repeat(2, 1fr); }
  }

  /* Loading state for images */
  .card-thumb { transition: opacity 0.2s; }
  .card-thumb[data-loading] { opacity: 0.3; }

  /* Smooth lightbox entry */
  #lb-inner {
    animation: lb-in 0.15s ease-out;
  }
  @keyframes lb-in {
    from { opacity: 0; transform: scale(0.96); }
    to { opacity: 1; transform: scale(1); }
  }
</style>
</head>

<!-- TOP BAR -->
<div id="topbar">
  <div id="topbar-row1">
    <div id="site-title">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
        <rect width="20" height="20" rx="4" fill="#4a9eff" opacity="0.15"/>

    <span id="counter">— of —</span>
  </div>
  <div id="filters">

    <span class="filter-hint">Shift/Ctrl+click for multi-select</span>

<!-- GRID -->
<div id="grid-wrap">

  <div id="empty">

</div>

<!-- LIGHTBOX -->
<div id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">
  <div id="lb-inner">
    <div id="lb-image-wrap">
      <img id="lb-img" src="" alt="">

      <button class="lb-nav" id="lb-next" title="Next (&#8594;)">&#8594;</button>
    </div>
    <div id="lb-panel">
      <div id="lb-meta">
        <div id="lb-filename"></div>
        <div id="lb-desc"></div>
        <div id="lb-tags"></div>
        <a id="lb-download" href="#" target="_blank" rel="noopener">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
            <line x1="8" y1="2" x2="8" y2="11"/><polyline points="4,8 8,12 12,8"/>
            <line x1="2" y1="14" x2="14" y2="14"/>
          </svg>
          Download full image
        </a>
        <div id="lb-counter"></div>
      </div>
      <div id="lb-specs">
        <div><span class="lb-spec-val" id="lb-dims"></span></div>
        <div><span class="lb-spec-val" id="lb-size"></span></div>
        <div id="lb-cat-badge"></div>
      </div>
    </div>
  </div>
</div>

  { id: 'all',         label: 'All',           count: MANIFEST.length },
  { id: 'v4-active',   label: 'On v4 Site',    count: 43 },

// ── State ────────────────────────────────────────
let activeCats = new Set(['all']);  // 'all' means show everything
let searchQuery = '';
let filteredItems = [];
let lbIndex = 0;

// ── DOM refs ─────────────────────────────────────
const $grid   = document.getElementById('grid');
const $empty  = document.getElementById('empty');

const $filters = document.getElementById('filters');
const $search  = document.getElementById('search');
const $searchClear = document.getElementById('search-clear');
const $lb     = document.getElementById('lightbox');
const $lbImg  = document.getElementById('lb-img');
const $lbFilename = document.getElementById('lb-filename');
const $lbDesc = document.getElementById('lb-desc');
const $lbTags = document.getElementById('lb-tags');
const $lbDims = document.getElementById('lb-dims');

const $lbPrev = document.getElementById('lb-prev');
const $lbNext = document.getElementById('lb-next');
const $lbClose = document.getElementById('lb-close');

// ── Build filter buttons ─────────────────────────
function buildFilters() {
  // Remove existing buttons (keep hint span)
  const hint = $filters.querySelector('.filter-hint');
  $filters.innerHTML = '';

  CATS.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.dataset.cat = cat.id;
    btn.innerHTML = cat.label + '<span class=\'count\'>' + cat.count + '</span>';
    if (activeCats.has(cat.id)) btn.classList.add('active');
    btn.addEventListener('click', (e) => onCatClick(cat.id, e));
    $filters.appendChild(btn);
  });

  $filters.appendChild(hint);
}

// ── Category click handler ───────────────────────
function onCatClick(catId, e) {
  const multi = e.shiftKey || e.ctrlKey || e.metaKey;

  if (catId === 'all') {
    activeCats = new Set(['all']);
  } else if (multi) {
    // Multi-select: toggle this category
    activeCats.delete('all');
    if (activeCats.has(catId)) {
      activeCats.delete(catId);
      if (activeCats.size === 0) activeCats = new Set(['all']);
    } else {
      activeCats.add(catId);
    }
  } else {
    // Single-select: if already the only one active, reset to all
    if (activeCats.size === 1 && activeCats.has(catId)) {
      activeCats = new Set(['all']);
    } else {
      activeCats = new Set([catId]);
    }
  }

  // Toggle "All" badge visibility
  document.body.classList.toggle('show-cat-badge', activeCats.has('all'));

  buildFilters();
  render();
}

// ── Search handler ───────────────────────────────
$search.addEventListener('input', () => {
  searchQuery = $search.value.trim().toLowerCase();
  $searchClear.style.display = searchQuery ? 'block' : 'none';
  render();
});

$searchClear.addEventListener('click', () => {
  $search.value = '';
  searchQuery = '';
  $searchClear.style.display = 'none';
  $search.focus();
  render();
});

// ── Filter logic ─────────────────────────────────
function matchesFilter(item) {
  if (!activeCats.has('all') && !activeCats.has(item.cat)) return false;
  if (!searchQuery) return true;

  const q = searchQuery;
  if (item.fn.toLowerCase().includes(q)) return true;
  if (item.desc && item.desc.toLowerCase().includes(q)) return true;
  if (item.tags && item.tags.some(t => t.toLowerCase().includes(q))) return true;
  if (item.cat && item.cat.toLowerCase().includes(q)) return true;
  return false;
}

// ── Get category label ───────────────────────────
function catLabel(catId) {
  const c = CATS.find(c => c.id === catId);
  return c ? c.label : catId;
}

// ── Render grid ──────────────────────────────────
function render() {
  filteredItems = MANIFEST.filter(matchesFilter);

  $counter.textContent = filteredItems.length + ' of ' + MANIFEST.length;
  $empty.style.display = filteredItems.length === 0 ? 'block' : 'none';
  $grid.style.display = filteredItems.length === 0 ? 'none' : '';

  // Use DocumentFragment for performance
  const frag = document.createDocumentFragment();

  filteredItems.forEach((item, idx) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.title = item.desc || item.fn;

    const img = document.createElement('img');
    img.className = 'card-thumb';
    img.src = '../../library/thumbs/' + item.thumb;
    img.alt = item.desc || item.fn;
    img.loading = 'lazy';
    img.decoding = 'async';

    const info = document.createElement('div');
    info.className = 'card-info';

    const name = document.createElement('div');
    name.className = 'card-name';
    name.textContent = item.fn;

    const desc = document.createElement('div');
    desc.className = 'card-desc';
    desc.textContent = item.desc || ('Category: ' + catLabel(item.cat));

    info.appendChild(name);
    info.appendChild(desc);

    // Category badge (shown when "All" is active)
    const badge = document.createElement('span');
    badge.className = 'card-cat-badge';
    badge.textContent = catLabel(item.cat);

    card.appendChild(img);
    card.appendChild(info);
    card.appendChild(badge);

    card.addEventListener('click', () => openLightbox(idx));
    frag.appendChild(card);
  });

  $grid.innerHTML = '';
  $grid.appendChild(frag);
}

// ── Lightbox ─────────────────────────────────────
function openLightbox(idx) {
  lbIndex = idx;
  showLbItem();
  $lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  $lb.classList.remove('open');
  document.body.style.overflow = '';
  $lbImg.src = '';
}

function showLbItem() {
  const item = filteredItems[lbIndex];
  if (!item) return;

  $lbImg.src = '../../library/full/' + item.fn;
  $lbImg.alt = item.desc || item.fn;
  $lbFilename.textContent = item.fn;
  $lbDesc.textContent = item.desc || '';
  $lbDesc.style.display = item.desc ? '' : 'none';

  // Tags
  $lbTags.innerHTML = '';
  if (item.tags && item.tags.length) {
    item.tags.forEach(tag => {
      const span = document.createElement('span');
      span.className = 'lb-tag';
      span.textContent = tag;
      $lbTags.appendChild(span);
    });
  }

  $lbDims.textContent = item.w + ' × ' + item.h + ' px';
  $lbSize.textContent = item.size_kb + ' KB';
  $lbCatBadge.textContent = catLabel(item.cat);
  $lbCounter.textContent = (lbIndex + 1) + ' / ' + filteredItems.length;
  $lbDownload.href = '../../library/full/' + item.fn;
  $lbDownload.download = item.fn;

  // Arrow visibility
  $lbPrev.style.opacity = lbIndex > 0 ? '1' : '0.25';
  $lbPrev.style.pointerEvents = lbIndex > 0 ? '' : 'none';
  $lbNext.style.opacity = lbIndex < filteredItems.length - 1 ? '1' : '0.25';
  $lbNext.style.pointerEvents = lbIndex < filteredItems.length - 1 ? '' : 'none';
}

function lbNavigate(dir) {
  const next = lbIndex + dir;
  if (next >= 0 && next < filteredItems.length) {
    lbIndex = next;
    showLbItem();
  }
}

$lbClose.addEventListener('click', closeLightbox);
$lbPrev.addEventListener('click', () => lbNavigate(-1));
$lbNext.addEventListener('click', () => lbNavigate(1));

// Close on overlay click (outside inner panel)
$lb.addEventListener('click', (e) => {
  if (e.target === $lb) closeLightbox();
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (!$lb.classList.contains('open')) return;
  if (e.key === 'Escape') { closeLightbox(); return; }
  if (e.key === 'ArrowLeft')  { lbNavigate(-1); return; }
  if (e.key === 'ArrowRight') { lbNavigate(1);  return; }
});

// Swipe on mobile
let touchStartX = null;
$lb.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
}, { passive: true });
$lb.addEventListener('touchend', (e) => {
  if (touchStartX === null) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  touchStartX = null;
  if (Math.abs(dx) > 40) lbNavigate(dx < 0 ? 1 : -1);
}, { passive: true });

// ── Init ─────────────────────────────────────────
document.body.classList.add('show-cat-badge'); // start on "All"
buildFilters();
render();
</script>
</body>
